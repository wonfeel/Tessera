name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (CPU-only, no CUDA)
        run: cmake --preset x64-release
        working-directory: ${{ github.workspace }}

      - name: Build
        run: cmake --build out/build/x64-release --target Test_correctness Test_propagation
        working-directory: ${{ github.workspace }}

      - name: Run Test_correctness
        run: out/build/x64-release/Test_correctness.exe
        working-directory: ${{ github.workspace }}

      # Test_propagation needs an OpenGL context (GLFW hidden window).
      # GitHub runners have no GPU/display — skipped here, run locally.
